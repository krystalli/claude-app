<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>股票投資計算器</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 1.5rem;
      max-width: 960px;
      margin: 0 auto 1.5rem;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: #94a3b8;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus { outline: none; border-color: #38bdf8; }
    input::placeholder { color: #475569; }

    .presets {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .preset-btn {
      padding: 0.25rem 0.65rem;
      border-radius: 20px;
      border: 1px solid #475569;
      background: transparent;
      color: #94a3b8;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .preset-btn:hover { border-color: #38bdf8; color: #38bdf8; }

    .calc-btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.9rem;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .calc-btn:hover { opacity: 0.88; }
    .calc-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading-bar {
      display: none;
      text-align: center;
      color: #64748b;
      font-size: 0.9rem;
      padding: 0.75rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .tab {
      padding: 0.45rem 1rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: transparent;
      color: #64748b;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: #334155;
      color: #e2e8f0;
      border-color: #475569;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
      gap: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .stat-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 0.9rem;
      text-align: center;
    }

    .stat-box.highlight { border-color: #38bdf8; }
    .stat-label { font-size: 0.75rem; color: #64748b; margin-bottom: 0.35rem; }

    .stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #38bdf8;
    }

    .stat-value.green { color: #4ade80; }
    .stat-value.purple { color: #a78bfa; }

    .chart-wrapper {
      position: relative;
      height: 300px;
      margin-bottom: 1.5rem;
    }

    .table-wrapper { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    th {
      background: #0f172a;
      color: #64748b;
      padding: 0.6rem 0.9rem;
      text-align: right;
      font-weight: 500;
      border-bottom: 1px solid #334155;
      white-space: nowrap;
    }

    th:first-child { text-align: left; }

    td {
      padding: 0.55rem 0.9rem;
      text-align: right;
      border-bottom: 1px solid #1e293b;
      color: #cbd5e1;
      white-space: nowrap;
    }

    td:first-child { text-align: left; color: #94a3b8; }
    tr:hover td { background: #1e293b; }
    .green-cell { color: #4ade80; }
    .red-cell { color: #f87171; }
    .hl-row td { background: #1e3a5f !important; font-weight: 600; }
    .hl-row td:first-child { color: #38bdf8; }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .compare-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1rem;
    }

    .compare-box .period { font-size: 0.78rem; color: #64748b; margin-bottom: 0.5rem; }
    .compare-box .invested { font-size: 0.82rem; color: #94a3b8; margin-bottom: 0.3rem; }

    .compare-box .result-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #4ade80;
      margin-bottom: 0.25rem;
    }

    .compare-box .result-value.loss { color: #f87171; }

    .compare-box .cagr-badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      background: rgba(74,222,128,0.15);
      color: #4ade80;
    }

    .compare-box .cagr-badge.loss {
      background: rgba(248,113,113,0.15);
      color: #f87171;
    }

    .note {
      text-align: center;
      color: #475569;
      font-size: 0.75rem;
      margin-top: 1rem;
    }

    .results { display: none; }
    .error-msg { color: #f87171; font-size: 0.85rem; text-align: center; padding: 0.5rem; }
  </style>
</head>
<body>

<h1>股票投資計算器</h1>
<p class="subtitle">輸入股票代號與金額，同時顯示歷史回測 + 未來預估</p>

<div class="card">
  <div class="form-grid">
    <div>
      <label>股票代號</label>
      <input id="ticker" type="text" placeholder="2330.TW、AAPL、SPY" maxlength="12" />
      <div style="font-size:0.75rem;color:#475569;margin-top:0.4rem">台股加 .TW，例如 2330.TW</div>
    </div>

    <div>
      <label>初始投資金額（元）</label>
      <input id="principal" type="number" placeholder="例如：100000" min="0" />
    </div>

    <div>
      <label>每月定期定額（元）</label>
      <input id="monthly" type="number" placeholder="0 代表不定投" min="0" value="0" />
    </div>

    <div>
      <label>預期年化報酬率（%）<span style="color:#475569;font-weight:400">（有股票代號時自動填入）</span></label>
      <input id="rate" type="number" placeholder="例如：10" step="0.1" />
      <div class="presets">
        <button class="preset-btn" onclick="setRate(7)">保守 7%</button>
        <button class="preset-btn" onclick="setRate(10)">S&amp;P500 10%</button>
        <button class="preset-btn" onclick="setRate(15)">積極 15%</button>
        <button class="preset-btn" onclick="setRate(20)">高風險 20%</button>
      </div>
    </div>
  </div>

  <button class="calc-btn" id="calcBtn" onclick="run()">計算</button>
  <div class="loading-bar" id="loadingBar">⏳ 抓取歷史資料中...</div>
</div>

<div class="results" id="results">
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('backtest', this)">📊 歷史回測</button>
      <button class="tab" onclick="switchTab('projection', this)">🔮 未來預估</button>
    </div>

    <div class="tab-content active" id="tab-backtest">
      <div id="backtestContent"></div>
    </div>

    <div class="tab-content" id="tab-projection">
      <div class="stats-grid" id="projStats"></div>
      <div class="chart-wrapper">
        <canvas id="chart"></canvas>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>年份</th>
              <th>投入本金</th>
              <th>預估資產</th>
              <th>獲利</th>
              <th>報酬率</th>
            </tr>
          </thead>
          <tbody id="projTable"></tbody>
        </table>
      </div>
    </div>

    <p class="note">* 歷史回測基於實際收盤價。未來預估為複利估算，不構成投資建議。</p>
  </div>
</div>

<script>
  let chartInstance = null;

  function setRate(val) {
    document.getElementById('rate').value = val;
  }

  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  function fmt(n) { return Math.round(n).toLocaleString('zh-TW'); }
  function fmtRate(r) { return (r > 0 ? '+' : '') + r.toFixed(1) + '%'; }

  async function fetchHistory(ticker) {
    const proxy = 'https://corsproxy.io/?';
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?range=22y&interval=1mo`;
    const res = await fetch(proxy + encodeURIComponent(url));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const result = data?.chart?.result?.[0];
    if (!result) throw new Error('查無此股票，請確認代號（台股加 .TW）');

    const timestamps = result.timestamp;
    const closes = (result.indicators?.adjclose?.[0]?.adjclose) ||
                   (result.indicators?.quote?.[0]?.close);
    if (!timestamps || !closes || closes.length < 24) throw new Error('歷史資料不足');

    const name = result.meta?.longName || result.meta?.shortName || ticker;
    const pairs = timestamps.map((t, i) => ({ t, p: closes[i] })).filter(x => x.p != null);
    return { pairs, name };
  }

  function priceAtDate(pairs, targetMs) {
    let best = pairs[0], bestDiff = Math.abs(pairs[0].t * 1000 - targetMs);
    for (const p of pairs) {
      const diff = Math.abs(p.t * 1000 - targetMs);
      if (diff < bestDiff) { bestDiff = diff; best = p; }
    }
    return best.p;
  }

  function backtestLumpSum(pairs, principal, yearsAgo) {
    const nowMs = Date.now();
    const startMs = nowMs - yearsAgo * 365.25 * 24 * 3600 * 1000;
    const pStart = priceAtDate(pairs, startMs);
    const pEnd = pairs[pairs.length - 1].p;
    const value = principal * (pEnd / pStart);
    const cagr = (Math.pow(pEnd / pStart, 1 / yearsAgo) - 1) * 100;
    return { value, cagr };
  }

  function backtestDCA(pairs, monthly, yearsAgo) {
    if (monthly <= 0) return null;
    const nowMs = Date.now();
    const startMs = nowMs - yearsAgo * 365.25 * 24 * 3600 * 1000;
    const relevant = pairs.filter(p => p.t * 1000 >= startMs);
    if (relevant.length < 3) return null;
    let shares = 0, totalInvested = 0;
    for (const p of relevant) { shares += monthly / p.p; totalInvested += monthly; }
    const value = shares * pairs[pairs.length - 1].p;
    const cagr = (Math.pow(value / totalInvested, 1 / yearsAgo) - 1) * 100;
    return { value, totalInvested, cagr };
  }

  function renderBacktest(pairs, name, principal, monthly) {
    const periods = [5, 10, 15, 20];
    const nowYear = new Date().getFullYear();
    const maxYears = (pairs[pairs.length - 1].t - pairs[0].t) / (365.25 * 24 * 3600);
    const usableYears = Math.min(Math.floor(maxYears), 20);

    const ls = backtestLumpSum(pairs, 1, usableYears);
    document.getElementById('rate').value = ls.cagr.toFixed(1);

    let html = `<div style="margin-bottom:1rem">
      <span style="color:#94a3b8;font-size:0.9rem">📈 ${name}</span>
      <span style="margin-left:0.75rem;font-size:0.82rem;color:#64748b">近 ${usableYears} 年 CAGR：</span>
      <span style="color:#4ade80;font-weight:700">${fmtRate(ls.cagr)}</span>
    </div>`;

    if (principal > 0) {
      html += `<div class="card-title">單筆投入 $${fmt(principal)} 元的歷史結果</div><div class="compare-grid">`;
      for (const y of periods) {
        if (y > usableYears) {
          html += `<div class="compare-box"><div class="period">${y} 年前（${nowYear - y}）</div><div style="color:#475569;font-size:0.85rem">資料不足</div></div>`;
          continue;
        }
        const r = backtestLumpSum(pairs, principal, y);
        const profit = r.value - principal;
        const isLoss = profit < 0;
        html += `<div class="compare-box">
          <div class="period">${y} 年前（${nowYear - y} 年投入）</div>
          <div class="invested">投入 $${fmt(principal)}</div>
          <div class="result-value ${isLoss ? 'loss' : ''}">$${fmt(r.value)}</div>
          <span class="cagr-badge ${isLoss ? 'loss' : ''}">${isLoss ? '' : '+'}${fmt(profit)} 元｜CAGR ${fmtRate(r.cagr)}</span>
        </div>`;
      }
      html += `</div>`;
    }

    if (monthly > 0) {
      html += `<div class="card-title" style="margin-top:1rem">每月定投 $${fmt(monthly)} 元的歷史結果</div><div class="compare-grid">`;
      for (const y of periods) {
        if (y > usableYears) {
          html += `<div class="compare-box"><div class="period">${y} 年前開始定投</div><div style="color:#475569;font-size:0.85rem">資料不足</div></div>`;
          continue;
        }
        const r = backtestDCA(pairs, monthly, y);
        if (!r) continue;
        const profit = r.value - r.totalInvested;
        const isLoss = profit < 0;
        html += `<div class="compare-box">
          <div class="period">${y} 年（${nowYear - y} 年開始）</div>
          <div class="invested">共投入 $${fmt(r.totalInvested)}</div>
          <div class="result-value ${isLoss ? 'loss' : ''}">$${fmt(r.value)}</div>
          <span class="cagr-badge ${isLoss ? 'loss' : ''}">${isLoss ? '' : '+'}${fmt(profit)} 元｜CAGR ${fmtRate(r.cagr)}</span>
        </div>`;
      }
      html += `</div>`;
    }

    document.getElementById('backtestContent').innerHTML = html;
  }

  function renderProjection(rate, principal, monthly) {
    const r = rate / 100, rm = r / 12;
    const years = [], totals = [], invested = [];
    for (let y = 1; y <= 20; y++) {
      const comp = principal * Math.pow(1 + r, y);
      const dca = monthly > 0 ? monthly * ((Math.pow(1 + rm, y * 12) - 1) / rm) : 0;
      years.push(y); totals.push(comp + dca); invested.push(principal + monthly * 12 * y);
    }
    const pick = n => ({ v: totals[n-1], p: invested[n-1] });
    const y5 = pick(5), y10 = pick(10), y20 = pick(20);

    document.getElementById('projStats').innerHTML = `
      <div class="stat-box"><div class="stat-label">5 年後資產</div><div class="stat-value">$${fmt(y5.v)}</div></div>
      <div class="stat-box"><div class="stat-label">5 年獲利</div><div class="stat-value green">+$${fmt(y5.v-y5.p)}</div></div>
      <div class="stat-box"><div class="stat-label">10 年後資產</div><div class="stat-value">$${fmt(y10.v)}</div></div>
      <div class="stat-box"><div class="stat-label">10 年獲利</div><div class="stat-value green">+$${fmt(y10.v-y10.p)}</div></div>
      <div class="stat-box highlight"><div class="stat-label">20 年後資產</div><div class="stat-value purple">$${fmt(y20.v)}</div></div>
      <div class="stat-box"><div class="stat-label">20 年報酬率</div><div class="stat-value purple">${((y20.v/y20.p-1)*100).toFixed(1)}%</div></div>`;

    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(document.getElementById('chart').getContext('2d'), {
      type: 'line',
      data: {
        labels: years.map(y => y + '年'),
        datasets: [
          { label: '預估資產', data: totals, borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.1)', fill: true, tension: 0.4, pointRadius: 3 },
          { label: '投入本金', data: invested, borderColor: '#475569', backgroundColor: 'rgba(71,85,105,0.08)', fill: true, tension: 0, borderDash: [5,5], pointRadius: 2 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#94a3b8' } },
          tooltip: { callbacks: { label: c => ` ${c.dataset.label}: $${fmt(c.raw)}` } }
        },
        scales: {
          x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
          y: { ticks: { color: '#64748b', callback: v => '$'+(v>=1e6?(v/1e6).toFixed(1)+'M':fmt(v)) }, grid: { color: '#1e293b' } }
        }
      }
    });

    const hlSet = new Set([5,10,15,20]);
    let rows = '';
    for (let i = 0; i < 20; i++) {
      const y = years[i], total = totals[i], inv = invested[i];
      const profit = total - inv, roi = ((total/inv-1)*100).toFixed(1);
      rows += `<tr class="${hlSet.has(y)?'hl-row':''}">
        <td>${y} 年</td><td>$${fmt(inv)}</td><td>$${fmt(total)}</td>
        <td class="green-cell">+$${fmt(profit)}</td><td class="green-cell">+${roi}%</td></tr>`;
    }
    document.getElementById('projTable').innerHTML = rows;
  }

  async function run() {
    const ticker = document.getElementById('ticker').value.trim().toUpperCase();
    const principal = parseFloat(document.getElementById('principal').value) || 0;
    const monthly = parseFloat(document.getElementById('monthly').value) || 0;
    if (principal <= 0 && monthly <= 0) { alert('請輸入初始投資金額或每月定投金額'); return; }

    const btn = document.getElementById('calcBtn');
    const loading = document.getElementById('loadingBar');
    btn.disabled = true; loading.style.display = 'block';

    try {
      if (ticker) {
        const { pairs, name } = await fetchHistory(ticker);
        renderBacktest(pairs, name, principal, monthly);
        document.querySelectorAll('.tab')[0].click();
      } else {
        document.getElementById('backtestContent').innerHTML = '<div class="error-msg">未輸入股票代號，僅顯示預估試算。</div>';
      }
      const rate = parseFloat(document.getElementById('rate').value);
      if (!rate || rate <= 0) { alert('請輸入預期年化報酬率'); return; }
      renderProjection(rate, principal, monthly);
      document.getElementById('results').style.display = 'block';
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (e) {
      alert('錯誤：' + e.message);
    } finally {
      btn.disabled = false; loading.style.display = 'none';
    }
  }
</script>
</body>
</html>
